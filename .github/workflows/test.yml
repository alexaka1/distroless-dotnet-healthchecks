name: Tests
on:
  pull_request:
    branches:
      - main
      - beta
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  CI: 'true'
  TESTINGPLATFORM_TELEMETRY_OPTOUT: '1'
  HEALTHCHECK_IMAGE_NAME: distroless-dotnet-healthchecks
  HEALTHCHECK_IMAGE_TAG: test

jobs:
  path-filter:
    name: Determine if workflow should run
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      code: ${{ steps.changes.outputs.code }}
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        if: github.event_name != 'workflow_dispatch'
        id: changes
        with:
          filters: |-
            code:
              - '**'
              - '!**/*.md'
  build-healthcheck:
    if: >-
      (github.event_name == 'workflow_dispatch' ||
        needs.path-filter.outputs.code == 'true')
      && !cancelled()
    runs-on: ${{ matrix.os }}
    needs: path-filter
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        platform:
          - amd64
          - arm64
        base-image-type:
          - ubuntu-chiseled
          - alpine
        include:
          - target-os: linux
          - platform: amd64
            os: ubuntu-latest
          - platform: arm64
            os: ubuntu-24.04-arm
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: audit
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        id: docker_build
        with:
          context: .
          file: src/Distroless.HealthChecks/Dockerfile
          target: binary
          platforms: ${{ matrix.target-os }}/${{ matrix.platform }}
          build-args: |
            BASE_IMAGE_TYPE=${{ matrix.base-image-type }}
          push: false
          tags: ${{ env.HEALTHCHECK_IMAGE_NAME }}:${{ env.HEALTHCHECK_IMAGE_TAG }}
          outputs: type=docker,dest=${{ runner.temp }}/image.tar
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.HEALTHCHECK_IMAGE_NAME }}-${{ matrix.target-os }}-${{ matrix.platform }}-${{ matrix.base-image-type }}
          path: ${{ runner.temp }}/image.tar

  test:
    needs:
      - build-healthcheck
      - path-filter
    if: >-
      (github.event_name == 'workflow_dispatch' ||
        needs.path-filter.outputs.code == 'true')
      && !cancelled()
    strategy:
      fail-fast: false
      matrix:
        platform:
          - amd64
          - arm64
        base-image-type:
          - ubuntu-chiseled
          - alpine
        include:
          - target-os: linux
          - platform: amd64
            os: ubuntu-latest
          - platform: arm64
            os: ubuntu-24.04-arm
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/test-workflow.yml
    with:
      runs-on: ${{ matrix.os }}
      platform: ${{ matrix.platform }}
      healthcheck_image: distroless-dotnet-healthchecks:test
      base-image-type: ${{ matrix.base-image-type }}
      healthcheck_artifact: distroless-dotnet-healthchecks-${{ matrix.target-os }}-${{ matrix.platform }}-${{ matrix.base-image-type }}
  success:
    timeout-minutes: 2
    if: ${{ always() }}
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Fail if test job failed
        if: ${{ needs.test.result == 'failure' }}
        run: exit 1
      - name: Fail if test job was cancelled
        if: ${{ needs.test.result == 'cancelled' }}
        run: exit 1
      - name: Success
        run: echo "Success"
